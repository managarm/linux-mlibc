sources:
  - name: extra-cmake-modules
    subdir: 'ports'
    git: 'https://github.com/KDE/extra-cmake-modules.git'
    tag: 'v6.24.0'
    version: '6.24.0'

  - name: kcodecs
    subdir: 'ports'
    git: 'https://github.com/KDE/kcodecs.git'
    tag: 'v6.24.0'
    version: '6.24.0'

  - name: kcolorscheme
    subdir: 'ports'
    git: 'https://github.com/KDE/kcolorscheme.git'
    tag: 'v6.24.0'
    version: '6.24.0'

  - name: kconfig
    subdir: 'ports'
    git: 'https://github.com/KDE/kconfig.git'
    tag: 'v6.24.0'
    version: '6.24.0'

  - name: kguiaddons
    subdir: 'ports'
    git: 'https://github.com/KDE/kguiaddons.git'
    tag: 'v6.24.0'
    version: '6.24.0'

  - name: ki18n
    subdir: 'ports'
    git: 'https://github.com/KDE/ki18n.git'
    tag: 'v6.24.0'
    version: '6.24.0'

tools:
  - name: host-ecm
    architecture: noarch
    from_source: extra-cmake-modules
    tools_required:
      - cross-cmake
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=@PREFIX@'
        - '@THIS_SOURCE_DIR@'
    compile:
      - args: ['cmake', '--build', '.', '--parallel', '@PARALLELISM@']
    install:
      - args: ['cmake', '--install', '.']

  - name: host-kconfig
    architecture: noarch
    from_source: kconfig
    tools_required:
      - cross-cmake
      - cross-qt6
      - host-ecm
      - host-ninja
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=@PREFIX@'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        - '-DKDE_INSTALL_QMLDIR=@PREFIX@/lib/qt6/qml'
        - '-DKDE_INSTALL_LIBEXECDIR_KF=@PREFIX@/libexec'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '-DKCONFIG_USE_DBUS=TRUE'
        - '-DKCONFIG_USE_QML=TRUE'
        - '@THIS_SOURCE_DIR@'
    compile:
      - args: ['ninja']
    install:
      - args: ['ninja', 'install']

packages:
  - name: kcodecs
    architecture: '@OPTION:arch@'
    metadata:
      summary: Framework for manipulating strings using various encodings
      description: This package provides a framework for manipulating strings using various encodings.
      spdx: 'LGPL-2.0-or-later GPL-2.0-or-later'
      website: 'https://develop.kde.org/products/frameworks/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-frameworks']
    from_source: kcodecs
    tools_required:
      - cross-toolchain
      - cross-cmake
      - cross-qt6
      - host-ecm
    pkgs_required:
      - mlibc
      - qtbase6
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=Debug'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: kcolorscheme
    architecture: '@OPTION:arch@'
    metadata:
      summary: Framework for downloading and sharing additional application data
      description: This package provides a framework for downloading and sharing additional application data.
      spdx: 'LGPL-2.0-or-later'
      website: 'https://develop.kde.org/products/frameworks/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-frameworks']
    from_source: kcolorscheme
    tools_required:
      - cross-toolchain
      - cross-cmake
      - cross-qt6
      - host-ecm
    pkgs_required:
      - mlibc
      - kconfig
      - kguiaddons
      - ki18n
      - qtbase6
      - qtdeclarative6
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=Debug'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: kconfig
    architecture: '@OPTION:arch@'
    metadata:
      summary: Framework for reading and writing configuration
      description: This package provides a framework for reading and writing configuration.
      spdx: 'LGPL-2.0-or-later'
      website: 'https://develop.kde.org/products/frameworks/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-frameworks']
    from_source: kconfig
    tools_required:
      - cross-toolchain
      - cross-cmake
      - cross-qt6
      - host-ecm
    pkgs_required:
      - mlibc
      - qtbase6
      - qtdeclarative6
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=Debug'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        - '-DKDE_INSTALL_QMLDIR=/usr/lib/qt6/qml'
        - '-DKDE_INSTALL_LIBEXECDIR_KF=/usr/libexec'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '-DKCONFIG_USE_DBUS=TRUE'
        - '-DKCONFIG_USE_QML=TRUE'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: kguiaddons
    architecture: '@OPTION:arch@'
    metadata:
      summary: Framework providing assorted high-level user interface components
      description: This package provides a framework providing assorted high-level user interface components.
      spdx: 'LGPL-2.0-or-later'
      website: 'https://develop.kde.org/products/frameworks/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-frameworks']
    from_source: kguiaddons
    tools_required:
      - cross-gcc
      - virtual: pkgconfig-for-target
        triple: '@OPTION:arch-triple@'
      - cross-cmake
      - cross-qt6
      - host-ecm
      - wayland-scanner
    pkgs_required:
      - mlibc
      - libice
      - libx11
      - libxcb
      - plasma-wayland-protocols
      - qtbase6
      - qtwayland6
      - wayland
      - wayland-protocols
      - xorg-proto
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=Debug'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        - '-DKDE_INSTALL_QMLDIR=/usr/lib/qt6/qml'
        - '-DKDE_INSTALL_QTPLUGINDIR=/usr/lib/qt6/plugins'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '-DBUILD_GEO_SCHEME_HANDLER=ON'
        - '-DWITH_DBUS=ON'
        - '-DWITH_WAYLAND=ON'
        - '-DWITH_X11=ON'
        - '-DBUILD_PYTHON_BINDINGS=OFF'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: ki18n
    architecture: '@OPTION:arch@'
    metadata:
      summary: Framework based on Gettext for internationalizing user interface text
      description: This package provides a framework based on Gettext for internationalizing user interface text.
      spdx: 'LGPL-2.0-or-later'
      website: 'https://develop.kde.org/products/frameworks/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-frameworks']
    from_source: ki18n
    tools_required:
      - cross-toolchain
      - cross-cmake
      - cross-qt6
      - host-ecm
    pkgs_required:
      - mlibc
      - iso-codes
      - libintl
      - qtbase6
      - qtdeclarative6
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=Debug'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        - '-DKDE_INSTALL_QMLDIR=/usr/lib/qt6/qml'
        - '-DKDE_INSTALL_PLUGINDIR=/usr/lib/qt6/plugins'
        - '-DKDE_INSTALL_QTPLUGINDIR=/usr/lib/qt6/plugins'
        ### end ecm.class
        - '-DKF_IGNORE_PLATFORM_CHECK=TRUE' # We're porting, and this is the recommended way to do it.
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
