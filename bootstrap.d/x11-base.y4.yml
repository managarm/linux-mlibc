packages:
  - name: xcb-proto
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: X C-language Bindings protocol headers
      description: The xcb-proto package provides the XML-XCB protocol descriptions that libxcb uses to generate the majority of its code and API.
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/xorg/proto/xcbproto'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['x11-base']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/proto/xcbproto.git'
      tag: 'xcb-proto-1.17.0'
      version: '1.17.0'
      tools_required:
        - cross-autoconf-v2.69
        - cross-automake-v1.16
        - cross-libtool
        - cross-pkg-config
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - host-python
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libxau
      - libxdmcp
      - xorg-proto
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
        environ:
          PYTHON: '@BUILD_ROOT@/tools/host-python/bin/python3.14'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xorg-proto
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/proto/xorgproto.git'
      tag: 'xorgproto-2025.1'
      version: '2025.1'
      tools_required:
        - cross-toolchain
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xorg-server
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/xserver.git'
      tag: 'xorg-server-1.20.12'
      version: '1.20.12'
    tools_required:
      - cross-toolchain
      - wayland-scanner
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - virtual: pkgconfig-for-host
        program_name: host-pkg-config
    pkgs_required:
      - mlibc
      - libdrm
      - libepoxy
      - libx11
      - libxcb
      - libxdamage
      - libxext
      - libxfixes
      - libxfont2
      - libxi
      - libxrandr
      - libxkbfile
      - libxrender
      - libxshmfence
      - libxxf86vm
      - nettle
      - pixman
      - systemd
      - xkbcomp
      - xcb-proto
      - xorg-proto
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '-Dxorg=false'
        - '-Dxephyr=false'
        - '-Dxwayland=true'
        - '-Dxnest=false'
        - '-Ddmx=false'
        - '-Dxvfb=false'
        - '-Dxkb_output_dir=/var/lib/xkb'
        - '-Dos_vendor="The mlibc LFS Project"'
        - '-Dvendor_name="The mlibc LFS Project"'
        - '-Dvendor_name_short="mlibc-LFS"'
        - '-Dsuid_wrapper=false'
        - '-Dpciaccess=false'
        - '-Ddpms=false'
        - '-Dscreensaver=false'
        - '-Dxres=false'
        - '-Dxinerama=false'
        - '-Dxv=false'
        - '-Dxvmc=false'
        - '-Dsystemd_logind=false'
        - '-Dsecure-rpc=false'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xwayland
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    metadata:
      summary: Standalone X server running under Wayland
      description: Wayland is a complete window system in itself, but even so, if we're migrating away from X, it makes sense to have a good backwards compatibility story. With a few changes, the Xorg server can be modified to use wayland input devices for input and forward either the root window or individual top-level windows as wayland surfaces. The server still runs the same 2D driver with the same acceleration code as it does when it runs natively. The main difference is that wayland handles presentation of the windows instead of KMS.
      spdx: 'MIT'
      website: 'https://wayland.freedesktop.org/xserver.html'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['x11-base']
      replaces: ['xorg-server']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/xserver.git'
      tag: 'xwayland-24.1.9'
      version: '24.1.9'
    tools_required:
      - cross-toolchain
      - wayland-scanner
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - virtual: pkgconfig-for-host
        program_name: host-pkg-config
    pkgs_required:
      - mlibc
      - libdrm
      - libepoxy
      - libxcb
      - libxcvt
      - libxdmcp
      - libxext
      - libxfont2
      - libxkbfile
      - libxshmfence
      - nettle
      - pixman
      - systemd
      - wayland
      - wayland-protocols
      - xcb-proto
      - xkbcomp
      - xorg-proto
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '-Dxkb_dir=/usr/share/X11/xkb'
        - '-Dxkb_bin_dir=/usr/bin'
        - '-Dxvfb=false'
        - '-Dxkb_output_dir=/var/lib/xkb'
        - '-Dvendor_name="The linux-mlibc Project"'
        - '-Dvendor_name_short="linux-mlibc"'
        - '-Dvendor_web="https://managarm.org"'
        - '-Dfontrootdir=/usr/share/fonts/X11'
        - '-Ddpms=false'
        - '-Dscreensaver=false'
        - '-Dxres=false'
        - '-Dxinerama=false'
        - '-Dxv=false'
        - '-Dsecure-rpc=false'
        - '-Dglx=true'
        - '-Ddri3=true'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
