packages:
  - name: mesa-demos
    architecture: '@OPTION:arch@'
    metadata:
      summary: Mesa's OpenGL utility and demo programs
      description: Mesa's OpenGL utility and demo programs
      spdx: 'LGPL-2.0-only'
      website: 'https://gitlab.freedesktop.org/mesa/demos'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['x11-apps']
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/mesa/demos.git'
      tag: 'mesa-demos-9.0.0'
      version: '9.0.0'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - wayland-scanner
    pkgs_required:
      - mlibc
      - dbus
      - freeglut
      - freetype
      - glew
      - glu
      - libdrm
      - libx11
      - libxext
      - libxkbcommon
      - mesa
      - wayland
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dwith-system-data-files=true'
        - '-Dosmesa=disabled'
        - '-Dwayland=disabled' # No GTK-3 yet, libdecor needs that
        - '@THIS_SOURCE_DIR@'
        isolate_network: false
        environ:
          PKG_CONFIG_LIBDIR: '@BUILD_ROOT@/tools/wayland-scanner/lib/x86_64-linux-gnu/pkgconfig:@BUILD_ROOT@/system-root/usr/lib/pkgconfig:@BUILD_ROOT@/system-root/usr/share/pkgconfig'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xdpyinfo
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xdpyinfo.git'
      tag: 'xdpyinfo-1.3.2'
      version: '1.3.2'
      tools_required:
        - cross-toolchain
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libx11
      - libxcb
      - libxext
      - libxi
      - libxrender
      - libxtst
      - libxxf86vm
      - xcb-proto
      - xorg-proto
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
  
  - name: xdriinfo
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xdriinfo.git'
      tag: 'xdriinfo-1.0.6'
      version: '1.0.6'
      tools_required:
        - cross-toolchain
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libx11
      - mesa
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xkbcomp
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/app/xkbcomp.git'
      tag: 'xkbcomp-1.5.0'
      version: '1.5.0'
      tools_required:
        - cross-gcc
        - cross-libtool
        - cross-pkg-config
        - cross-autoconf-v2.71
        - cross-automake-v1.16
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libx11
      - libxkbfile
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
