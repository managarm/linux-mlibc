packages:
  - name: iso-codes
    architecture: '@OPTION:arch@'
    metadata:
      summary: ISO language, territory, currency, script codes and their translations
      description: This package contains a list of country, language and currency names and it is used as a central database for accessing this data.
      spdx: 'LGPL-2.1-or-later'
      website: 'https://salsa.debian.org/iso-codes-team/iso-codes'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['app-text']
    source:
      subdir: ports
      git: 'https://salsa.debian.org/iso-codes-team/iso-codes.git'
      tag: 'v4.20.1'
      version: '4.20.1'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: tree
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: https://gitlab.com/OldManProgrammer/unix-tree
      tag: '2.0.2'
      version: '2.0.2'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args: ['cp', '-r', '@THIS_SOURCE_DIR@/.', '@THIS_BUILD_DIR@']
    build:
      - args: ['make', 'CC=@OPTION:arch-triple@-gcc', '-j@PARALLELISM@']
      - args: ['make', 'PREFIX=@THIS_COLLECT_DIR@/usr', 'install']
