packages:
  - name: hunspell
    architecture: '@OPTION:arch@'
    metadata:
      summary: Spell checker, morphological analyzer library and command-line tool
      description: This package contains a spell checker, morphological analyzer library and command-line tool.
      spdx: 'LGPL-2.1-or-later'
      website: 'https://hunspell.github.io/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['app-text']
    source:
      subdir: ports
      git: 'https://github.com/hunspell/hunspell.git'
      tag: 'v1.7.2'
      version: '1.7.2'
      tools_required:
        - cross-autoconf-v2.71
        - cross-automake-v1.16
        - cross-libtool
        - cross-pkg-config
      regenerate:
        - args: ['autoreconf', '-fvi']
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libiconv
      - ncurses
      - readline
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-nls'
        - '--with-ui'
        - '--with-readline'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: iso-codes
    architecture: '@OPTION:arch@'
    metadata:
      summary: ISO language, territory, currency, script codes and their translations
      description: This package contains a list of country, language and currency names and it is used as a central database for accessing this data.
      spdx: 'LGPL-2.1-or-later'
      website: 'https://salsa.debian.org/iso-codes-team/iso-codes'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['app-text']
    source:
      subdir: ports
      git: 'https://salsa.debian.org/iso-codes-team/iso-codes.git'
      tag: 'v4.20.1'
      version: '4.20.1'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: tree
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: https://gitlab.com/OldManProgrammer/unix-tree
      tag: '2.0.2'
      version: '2.0.2'
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args: ['cp', '-r', '@THIS_SOURCE_DIR@/.', '@THIS_BUILD_DIR@']
    build:
      - args: ['make', 'CC=@OPTION:arch-triple@-gcc', '-j@PARALLELISM@']
      - args: ['make', 'PREFIX=@THIS_COLLECT_DIR@/usr', 'install']
