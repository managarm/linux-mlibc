      - libxshmfence
      - libxxf86vm
      - llvm
      - wayland
      - wayland-protocols
      - zlib
      - zstd
    revision: 1
    configure:
      - args: ['cp', '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file', 'meson.cross-file']
      - args:
        - 'sed'
        - '-i'
        - "/^# sed adds binaries here.$/a llvm-config = '@SOURCE_ROOT@/scripts/cross-llvm-config'"
        - 'meson.cross-file'
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - 'meson.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        # The debug build type enables some additional output from Mesa.
        - '--buildtype=debugoptimized'
        #- '--buildtype=debug'
        - '-Dglx=dri'
        - '-Dgallium-drivers=llvmpipe,virgl'
        - '-Dvulkan-drivers='
        - '-Dglvnd=enabled'
        # Force Mesa to build with LLVM.
        - '-Dllvm=enabled'
        - '-Dgallium-va=disabled'
        - '-Dshared-glapi=enabled'
        - '-Degl=enabled'
        - '-Dgbm=enabled'
        - '-Dgles1=enabled'
        - '-Dgles2=enabled'
        - '-Dzstd=enabled'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

