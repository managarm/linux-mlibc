  - name: gstreamer
    architecture: '@OPTION:arch@'
    metadata:
      summary: Open source multimedia framework
      description: This package contains a streaming media framework that enables applications to share a common set of plugins for tasks such as video encoding and decoding, audio encoding and decoding, audio and video filters, audio visualisation, web streaming and anything else that streams in real-time or otherwise. This package only provides base functionality and libraries of the GStreamer stack.
      spdx: 'LGPL-2.0-or-later'
      website: 'https://gstreamer.freedesktop.org/'
      maintainer: 'Dennis Bonke <dennis@managarm.org>'
      categories: ['media-libs']
    source:
      subdir: 'ports'
      url: 'https://gstreamer.freedesktop.org/src/gstreamer/gstreamer-1.28.1.tar.xz'
      format: 'tar.xz'
      extract_path: 'gstreamer-1.28.1'
      checksum: blake2b:856a7556ef18e10698750db3223fe03d6d692bd4aa2e5d4675c647d46f80f21d4817d764df07b1a3408fbf7e8bda71cbeb1d0470f47caf23f0d41d6ff72c3125
      version: '1.28.1'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - glib
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dtools=enabled'
        - '-Dlibexecdir=/usr/libexec'
        - '-Dintrospection=disabled'
        - '-Dptp-helper-permissions=setuid-root'
        - '-Dptp-helper-setuid-user=nobody'
        - '-Dptp-helper-setuid-group=nobody'
        - '-Dlibunwind=disabled'
        - '-Dlibdw=disabled'
        - '-Dgst_debug=false'
        - '-Dcheck=disabled'
        - '-Dpackage-origin=https://github.com/managarm/linux-mlibc/'
        - '-Dpackage-name="GStreamer 1.28.1 Linux-mlibc"'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

