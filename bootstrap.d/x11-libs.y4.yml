sources:
  - name: libxtrans
    subdir: ports
    git: 'https://gitlab.freedesktop.org/xorg/lib/libxtrans.git'
    tag: 'xtrans-1.6.0'
    version: '1.6.0'
    tools_required:
      - cross-toolchain
      - host-xorg-macros
    regenerate:
      - args: ['./autogen.sh']
        environ:
          'NOCONFIGURE': 'yes'

tools:
  - name: host-xtrans
    labels: [aarch64]
    architecture: noarch
    exports_aclocal: true
    from_source: libxtrans
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: cairo
    architecture: '@OPTION:arch@'
    metadata:
      summary: A vector graphics library with cross-device output support
      description: This package contains a 2D graphics library with support for multiple output devices. Currently supported output targets include the X Window System, Win32, image buffers, PostScript, PDF and SVG. Experimental backends include OpenGL, Quartz and XCB file output. Cairo is designed to produce consistent output on all output media while taking advantage of display hardware acceleration when available (e.g. through the X Render Extension).
      spdx: 'LGPL-2.1-only'
      website: 'https://www.cairographics.org/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['x11-libs']
    source:
      subdir: 'ports'
      git: 'https://gitlab.freedesktop.org/cairo/cairo.git'
      tag: '1.18.4'
      version: '1.18.4'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: '@OPTION:arch-triple@'
    pkgs_required:
      - mlibc
      - fontconfig
      - freetype
      - glib
      - libpng
      - libx11
      - libxcb
      - libxext
      - libxrender
      - mesa
      - pixman
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--buildtype=release'
        - '-Dxlib-xcb=enabled'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: gdk-pixbuf
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: ports
      git: 'https://gitlab.gnome.org/GNOME/gdk-pixbuf.git'
      tag: '2.40.0'
      version: '2.40.0'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
    pkgs_required:
      - mlibc
      - glib
      - libjpeg-turbo
      - libpng
      - libx11
      - shared-mime-info
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '-Dgir=false'
        - '-Dman=false'
        - '--wrap-mode=nofallback'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
    # xbps broke?
    # scripts:
    #     post_install:
    #       - args: ['gdk-pixbuf-query-loaders', '--update-cache']

  - name: gtk+-3
    architecture: '@OPTION:arch@'
    stability_level: 'broken'
    source:
      subdir: 'ports'
      git: 'https://gitlab.gnome.org/GNOME/gtk.git'
      tag: '3.24.23'
      version: '3.24.23'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: "@OPTION:arch-triple@"
      - wayland-scanner
      - host-glib
    pkgs_required:
      - mlibc
      - atk
      - at-spi2-atk
      - cairo
      - dbus
      - fontconfig
      - freetype
      - fribidi
      - gdk-pixbuf
      - glib
      - gsettings-desktop-schemas
      - harfbuzz
      - libepoxy
      - libx11
      - libxcb
      - libxcomposite
      - libxcursor
      - libxdamage
      - libxext
      - libxfixes
      - libxi
      - libxinerama
      - libxkbcommon
      - libxrandr
      - libxrender
      - pango
      - wayland
      - wayland-protocols
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dprint_backends=file'
        - '-Dintrospection=false'
        - '-Dx11_backend=true'
        # - '-Dx11_backend=false'
        - '-Dbroadway_backend=true'
        - '-Dwayland_backend=true'
        - '-Dgtk_doc=false'
        - '-Dcolord=no'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
    # xbps broke?
    # scripts:
    #     post_install:
    #       - args: ['gtk-query-immodules-3.0', '--update-cache']
    #       - args: ['glib-compile-schemas', '/usr/share/glib-2.0/schemas']

  - name: libdrm
    architecture: '@OPTION:arch@'
    metadata:
      summary: X.Org libdrm library
      description: Libdrm provides a userspace library for accessing the direct rendering manager (DRM) on operating systems that support the ioctl interface. Libdrm is a low-level library, typically used by graphics drivers such as the Mesa DRI drivers, the X drivers, libva and similar projects.
      spdx: 'MIT'
      website: 'https://gitlab.freedesktop.org/mesa/drm'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['dev-libs']
    source:
      subdir: 'ports'
      git: 'https://gitlab.freedesktop.org/mesa/drm'
      tag: 'libdrm-2.4.131'
      version: '2.4.131'
    tools_required:
      - cross-toolchain
      - virtual: pkgconfig-for-target
        triple: '@OPTION:arch-triple@'
    pkgs_required:
      - mlibc
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dintel=disabled'
        - '-Dvmwgfx=disabled'
        - '-Dradeon=disabled'
        - '-Damdgpu=disabled'
        - '-Dnouveau=disabled'
        # We might want to build cairo with OpenGL support.
        # Doing so would introduce a circular dependency here.
        - '-Dcairo-tests=disabled'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

