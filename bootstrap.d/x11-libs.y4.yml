      version: '0.4.1'
      tools_required:
        - cross-toolchain
        - host-xorg-macros
        - cross-autoconf-archive
      regenerate:
        - args: ['git', 'submodule', 'update', '--init']
        - args: ['autoreconf', '-fvi']
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libxcb
      - xcb-util
      - xorg-proto
      - xorg-util-macros
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
        - '--without-doxygen'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
