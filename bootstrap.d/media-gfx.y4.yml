packages:
  - name: graphite2
    architecture: '@OPTION:arch@'
    source:
      subdir: 'ports'
      git: 'https://github.com/silnrsi/graphite.git'
      tag: '1.3.14'
      version: '1.3.14'
    tools_required:
      - cross-toolchain
      - host-python
      - cross-cmake
    pkgs_required:
      - mlibc
      - libstdc++
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_POLICY_VERSION_MINIMUM=3.5'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: qrencode
    architecture: '@OPTION:arch@'
    metadata:
      summary: C library for encoding data in a QR Code symbol
      description: This package provides a library and command-line tool for encoding data in QR Code format.
      spdx: 'LGPL-2.0-only'
      website: 'https://fukuchi.org/en/works/qrencode/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['media-gfx']
    source:
      subdir: ports
      git: https://github.com/fukuchi/libqrencode
      tag: 'v4.1.1'
      version: '4.1.1'
      tools_required:
        - cross-toolchain
      regenerate:
        - args: ['autoreconf', '-fvi']
    tools_required:
      - cross-toolchain
    pkgs_required:
      - mlibc
      - libpng
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'DESTDIR=@THIS_COLLECT_DIR@', 'install']
