      - libjpeg-turbo
      - libwebp
      - libxkbcommon
      - libxcursor
      - mesa
      - pam
      - pango
      - seatd
      - wayland
      - wayland-protocols
      - xcb-util-cursor
      - xwayland
    revision: 1
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--native-file'
        - '@SOURCE_ROOT@/scripts/meson.native-file'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--libdir=lib'
        - '--buildtype=debugoptimized'
        - '-Dbackend-x11=false'
        - '-Dsimple-clients=damage,im,egl,shm,touch'
        - '-Dbackend-rdp=false'
        - '-Dbackend-vnc=false'
        - '-Dbackend-pipewire=false'
        - '-Dcolor-management-lcms=false'
        - '-Dimage-jpeg=true'
        - '-Dimage-webp=true'
        - '-Dsystemd=true'
        - '-Dremoting=false'
